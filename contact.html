<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Consultation - NeuroAI Consulting</title>
  <meta name="description" content="Get in touch with Arefeh Sherafati for NeuroAI consulting, research mentorship, and collaboration." />
  <style>
    body {
      font-family: sans-serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 2rem;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      color: #5A189A;
    }

    form {
      display: grid;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    label {
      font-weight: bold;
    }

    input, textarea {
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 1rem;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      background-color: #5A189A;
      color: white;
      padding: 0.75rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background-color: #4b1482;
    }

    button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }

    /* Honeypot: hidden from real users, catches bots */
    .hidden {
      display: none;
    }

    #form-status {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 4px;
      display: none;
    }

    #form-status.success {
      display: block;
      background-color: #e6f4ea;
      color: #1e7e34;
      border: 1px solid #b7dfc1;
    }

    #form-status.error {
      display: block;
      background-color: #fdecea;
      color: #b71c1c;
      border: 1px solid #f5c2c0;
    }
  </style>
</head>
<body>
  <h1>Get in Touch</h1>

  <form id="contact-form">
    <!-- Web3Forms access key (safe to be public: it only delivers to the registered inbox) -->
    <input type="hidden" name="access_key" value="60318525-8058-4dd7-b86d-9e64a7edf87e">

    <!-- Subject line of the email you receive -->
    <input type="hidden" name="subject" value="New message from your website contact form">
    <input type="hidden" name="from_name" value="Sherafati Website">

    <label for="fname">First Name</label>
    <input type="text" id="fname" name="First Name" required>

    <label for="lname">Last Name</label>
    <input type="text" id="lname" name="Last Name" required>

    <label for="company">Company</label>
    <input type="text" id="company" name="Company">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="Phone">

    <label for="message">Message</label>
    <textarea id="message" name="Message" required></textarea>

    <!-- Honeypot field: hidden from people, bots fill it in and get rejected -->
    <input type="checkbox" name="botcheck" class="hidden" style="display:none" tabindex="-1" autocomplete="off">

    <button type="submit">Send Message</button>
  </form>

  <div id="form-status"></div>

  <script>
    const form = document.getElementById('contact-form');
    const statusBox = document.getElementById('form-status');
    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      const formData = new FormData(form);
      const json = JSON.stringify(Object.fromEntries(formData));

      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: json
        });
        const result = await response.json();

        if (response.ok && result.success) {
          statusBox.className = 'success';
          statusBox.textContent = 'Thank you! Your message has been sent. I’ll get back to you soon.';
          form.reset();
        } else {
          statusBox.className = 'error';
          statusBox.textContent = result.message || 'Something went wrong. Please try again or email me directly.';
        }
      } catch (err) {
        statusBox.className = 'error';
        statusBox.textContent = 'Network error. Please try again in a moment.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
